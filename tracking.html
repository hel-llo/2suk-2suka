<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Track Order - 2suk-2suka</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#da0b0b",
          "background-dark": "#000000",
        },
        fontFamily: { "display": ["Space Grotesk"] },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  body { font-family: 'Space Grotesk', sans-serif; min-height: max(884px, 100dvh); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* Pulse ring for active step */
  @keyframes ping {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  .ping-ring::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: #da0b0b;
    animation: ping 1.2s ease-out infinite;
    z-index: 0;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease forwards; }
  .fade-up-2 { animation: fadeUp 0.4s ease 0.15s forwards; opacity: 0; }
  .fade-up-3 { animation: fadeUp 0.4s ease 0.3s forwards; opacity: 0; }
  .fade-up-4 { animation: fadeUp 0.4s ease 0.45s forwards; opacity: 0; }

  /* Step connector line */
  .step-line {
    width: 2px;
    flex: 1;
    min-height: 32px;
    margin: 2px auto;
  }
</style>
</head>

<body class="bg-background-dark text-slate-100 font-display pb-32">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto border-x border-slate-800 bg-background-dark">

  <!-- Header -->
  <div class="flex items-center bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-white/10">
    <div onclick="window.location.href='index.html'" class="text-primary flex size-12 shrink-0 items-center cursor-pointer">
      <span class="material-symbols-outlined text-3xl">arrow_back</span>
    </div>
    <h2 class="text-slate-100 text-xl font-bold flex-1 text-center pr-12 uppercase tracking-widest">Track Order</h2>
  </div>

  <div class="px-4 pt-6 space-y-4">

    <!-- Order ID + Status Banner -->
    <div class="fade-up bg-white/5 rounded-xl p-4 border border-white/10 flex items-center justify-between">
      <div>
        <p class="text-xs text-slate-500 font-bold uppercase tracking-wide mb-1">Order ID</p>
        <p class="font-bold text-primary tracking-widest text-sm" id="orderId">ORD-LOADING</p>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 rounded-full border" id="statusBadge">
        <div class="w-2 h-2 rounded-full animate-pulse" id="statusDot"></div>
        <span class="text-xs font-bold uppercase tracking-wide" id="statusLabel">Loading...</span>
      </div>
    </div>

    <!-- Order Type & ETA -->
    <div class="fade-up-2 grid grid-cols-2 gap-3">
      <div class="bg-white/5 rounded-xl p-4 border border-white/10">
        <p class="text-xs text-slate-500 font-bold uppercase tracking-wide mb-2">Type</p>
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-sm" id="typeIcon">delivery_dining</span>
          <span class="font-bold text-sm" id="typeText">Delivery</span>
        </div>
      </div>
      <div class="bg-white/5 rounded-xl p-4 border border-white/10">
        <p class="text-xs text-slate-500 font-bold uppercase tracking-wide mb-2">ETA</p>
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-sm">schedule</span>
          <span class="font-bold text-sm" id="etaText">20-30 min</span>
        </div>
      </div>
    </div>

    <!-- Progress Tracker -->
    <div class="fade-up-3 bg-white/5 rounded-xl p-5 border border-white/10">
      <p class="text-xs font-bold uppercase tracking-wide text-slate-500 mb-5">Order Progress</p>

      <div class="flex flex-col" id="stepsContainer"></div>
    </div>

    <!-- Order Items Summary -->
    <div class="fade-up-3 bg-white/5 rounded-xl overflow-hidden border border-white/10">
      <div class="flex items-center gap-2 p-4 border-b border-white/5">
        <span class="material-symbols-outlined text-primary text-sm">shopping_basket</span>
        <p class="text-xs font-bold uppercase tracking-wide text-slate-400">Your Items</p>
      </div>
      <div id="orderItems" class="divide-y divide-white/5"></div>
      <div class="flex justify-between items-center px-4 py-3 bg-primary/10 border-t border-primary/20">
        <span class="text-sm font-bold text-slate-300">Total Paid</span>
        <span class="font-bold text-primary" id="totalAmount">₱0.00</span>
      </div>
    </div>

    <!-- Delivery Address / Pickup Info -->
    <div class="fade-up-4 bg-white/5 rounded-xl p-4 border border-white/10" id="locationCard">
      <p class="text-xs font-bold uppercase tracking-wide text-slate-500 mb-3" id="locationTitle">Delivery Address</p>
      <div class="flex items-start gap-3">
        <span class="material-symbols-outlined text-primary mt-0.5 text-sm" id="locationIcon">location_on</span>
        <div>
          <p class="font-bold text-sm" id="locationName"></p>
          <p class="text-slate-400 text-xs mt-0.5" id="locationAddress"></p>
          <p class="text-slate-400 text-xs" id="locationPhone"></p>
        </div>
      </div>
    </div>

    <!-- Payment -->
    <div class="fade-up-4 bg-white/5 rounded-xl p-4 border border-white/10 flex justify-between items-center">
      <p class="text-xs font-bold uppercase tracking-wide text-slate-500">Payment</p>
      <p class="font-bold text-sm" id="paymentText">COD</p>
    </div>

  </div>

  <!-- Bottom Button -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 pb-8 bg-background-dark/90 backdrop-blur-md border-t border-white/10">
    <button onclick="window.location.href='index.html'"
      class="w-full bg-primary hover:bg-red-700 text-white py-4 rounded-xl font-bold text-base uppercase tracking-widest shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">restaurant_menu</span>
      Order Again
    </button>
  </div>

</div>

<script>
 // ============================================================
// FIX 2: Paste this <script> block into BOTH:
//   - confirmation.html
//   - tracking.html
// Replace your existing totals/order script with this block
// ============================================================

function loadOrderSummary() {
  try {
    // --- 1. Load data from localStorage ---
    const rawOrder    = localStorage.getItem('2suk_current_order');
    const rawProducts = localStorage.getItem('2suk_products');
    const rawFee      = localStorage.getItem('2suk_delivery_fee');

    // Safety redirect: if no active order, go home
    if (!rawOrder) {
      console.warn('No current order found. Redirecting to index.html');
      window.location.href = 'index.html';
      return;
    }

    const currentOrder = JSON.parse(rawOrder);
    const products     = rawProducts ? JSON.parse(rawProducts) : [];
    const deliveryFee  = rawFee ? parseFloat(rawFee) : 0;

    // currentOrder.items format: { "id": quantity, "id2": quantity2 }
    const items = currentOrder.items || {};

    // --- 2. Calculate subtotal by matching item IDs to prices ---
    let subtotal = 0;
    const itemDetails = [];

    Object.entries(items).forEach(([id, qty]) => {
      const product = products.find(p => String(p.id) === String(id));
      if (product) {
        const price    = parseFloat(product.price) || 0;
        const quantity = parseInt(qty) || 0;
        const lineTotal = price * quantity;
        subtotal += lineTotal;

        itemDetails.push({
          name:      product.name,
          price:     price,
          quantity:  quantity,
          lineTotal: lineTotal,
        });
      } else {
        console.warn('Product not found for ID:', id);
      }
    });

    const total = subtotal + deliveryFee;

    // --- 3. Update HTML spans ---

    // Subtotal
    const subtotalEl = document.getElementById('subtotal');
    if (subtotalEl) subtotalEl.textContent = '₱' + subtotal.toFixed(2);

    // Delivery fee
    const feeEl = document.getElementById('delivery-fee');
    if (feeEl) feeEl.textContent = '₱' + deliveryFee.toFixed(2);

    // Total
    const totalEl = document.getElementById('total');
    if (totalEl) totalEl.textContent = '₱' + total.toFixed(2);

    // --- 4. Update customer details ---
    const customer = currentOrder.customer || {};

    const nameEl    = document.getElementById('customer-name');
    const addressEl = document.getElementById('customer-address');
    const phoneEl   = document.getElementById('customer-phone');
    const notesEl   = document.getElementById('customer-notes');
    const orderIdEl = document.getElementById('order-id');

    if (nameEl)    nameEl.textContent    = customer.name    || 'N/A';
    if (addressEl) addressEl.textContent = customer.address || 'N/A';
    if (phoneEl)   phoneEl.textContent   = customer.phone   || 'N/A';
    if (notesEl)   notesEl.textContent   = customer.notes   || 'None';
    if (orderIdEl) orderIdEl.textContent = currentOrder.id  || 'N/A';

    // --- 5. Render item list (if element exists) ---
    const itemListEl = document.getElementById('order-items');
    if (itemListEl && itemDetails.length > 0) {
      itemListEl.innerHTML = itemDetails.map(item => `
        <div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.9rem;">
          <span>${item.name} × ${item.quantity}</span>
          <span>₱${item.lineTotal.toFixed(2)}</span>
        </div>
      `).join('');
    }

    // --- 6. Update order status (for tracking.html) ---
    const statusEl = document.getElementById('order-status');
    if (statusEl) {
      const status = currentOrder.status || 'pending';
      const STATUS_LABELS = {
        pending:    'Pending — Waiting',
        confirmed:  'Confirmed — Accepted',
        preparing:  'Preparing — In Kitchen',
        ready:      'Ready — For Pickup/Delivery',
        delivering: 'Out for Delivery',
        delivered:  'Delivered — Complete',
        cancelled:  'Cancelled',
      };
      statusEl.textContent = STATUS_LABELS[status] || status;
    }

  } catch (err) {
    console.error('loadOrderSummary failed:', err);
  }
}

// Run on load
document.addEventListener('DOMContentLoaded', loadOrderSummary);

</script>
</body>
</html>
