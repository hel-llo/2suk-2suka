<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Track Order - 2suk-2suka</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#da0b0b",
          "background-dark": "#000000",
        },
        fontFamily: { "display": ["Space Grotesk"] },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  body { font-family: 'Space Grotesk', sans-serif; min-height: max(884px, 100dvh); }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* Pulse ring for active step */
  @keyframes ping {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.8); opacity: 0; }
  }
  .ping-ring::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: #da0b0b;
    animation: ping 1.2s ease-out infinite;
    z-index: 0;
  }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease forwards; }
  .fade-up-2 { animation: fadeUp 0.4s ease 0.15s forwards; opacity: 0; }
  .fade-up-3 { animation: fadeUp 0.4s ease 0.3s forwards; opacity: 0; }
  .fade-up-4 { animation: fadeUp 0.4s ease 0.45s forwards; opacity: 0; }

  /* Step connector line */
  .step-line {
    width: 2px;
    flex: 1;
    min-height: 32px;
    margin: 2px auto;
  }
</style>
</head>

<body class="bg-background-dark text-slate-100 font-display pb-32">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto border-x border-slate-800 bg-background-dark">

  <!-- Header -->
  <div class="flex items-center bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10 border-b border-white/10">
    <div onclick="window.location.href='index.html'" class="text-primary flex size-12 shrink-0 items-center cursor-pointer">
      <span class="material-symbols-outlined text-3xl">arrow_back</span>
    </div>
    <h2 class="text-slate-100 text-xl font-bold flex-1 text-center pr-12 uppercase tracking-widest">Track Order</h2>
  </div>

  <div class="px-4 pt-6 space-y-4">

    <!-- Order ID + Status Banner -->
    <div class="fade-up bg-white/5 rounded-xl p-4 border border-white/10 flex items-center justify-between">
      <div>
        <p class="text-xs text-slate-500 font-bold uppercase tracking-wide mb-1">Order ID</p>
        <p class="font-bold text-primary tracking-widest text-sm" id="orderId">ORD-LOADING</p>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 rounded-full border" id="statusBadge">
        <div class="w-2 h-2 rounded-full animate-pulse" id="statusDot"></div>
        <span class="text-xs font-bold uppercase tracking-wide" id="statusLabel">Loading...</span>
      </div>
    </div>

    <!-- Order Type & ETA -->
    <div class="fade-up-2 grid grid-cols-2 gap-3">
      <div class="bg-white/5 rounded-xl p-4 border border-white/10">
        <p class="text-xs text-slate-500 font-bold uppercase tracking-wide mb-2">Type</p>
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-sm" id="typeIcon">delivery_dining</span>
          <span class="font-bold text-sm" id="typeText">Delivery</span>
        </div>
      </div>
      <div class="bg-white/5 rounded-xl p-4 border border-white/10">
        <p class="text-xs text-slate-500 font-bold uppercase tracking-wide mb-2">ETA</p>
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-sm">schedule</span>
          <span class="font-bold text-sm" id="etaText">20-30 min</span>
        </div>
      </div>
    </div>

    <!-- Progress Tracker -->
    <div class="fade-up-3 bg-white/5 rounded-xl p-5 border border-white/10">
      <p class="text-xs font-bold uppercase tracking-wide text-slate-500 mb-5">Order Progress</p>

      <div class="flex flex-col" id="stepsContainer"></div>
    </div>

    <!-- Order Items Summary -->
    <div class="fade-up-3 bg-white/5 rounded-xl overflow-hidden border border-white/10">
      <div class="flex items-center gap-2 p-4 border-b border-white/5">
        <span class="material-symbols-outlined text-primary text-sm">shopping_basket</span>
        <p class="text-xs font-bold uppercase tracking-wide text-slate-400">Your Items</p>
      </div>
      <div id="orderItems" class="divide-y divide-white/5"></div>
      <div class="flex justify-between items-center px-4 py-3 bg-primary/10 border-t border-primary/20">
        <span class="text-sm font-bold text-slate-300">Total Paid</span>
        <span class="font-bold text-primary" id="totalAmount">₱0.00</span>
      </div>
    </div>

    <!-- Delivery Address / Pickup Info -->
    <div class="fade-up-4 bg-white/5 rounded-xl p-4 border border-white/10" id="locationCard">
      <p class="text-xs font-bold uppercase tracking-wide text-slate-500 mb-3" id="locationTitle">Delivery Address</p>
      <div class="flex items-start gap-3">
        <span class="material-symbols-outlined text-primary mt-0.5 text-sm" id="locationIcon">location_on</span>
        <div>
          <p class="font-bold text-sm" id="locationName"></p>
          <p class="text-slate-400 text-xs mt-0.5" id="locationAddress"></p>
          <p class="text-slate-400 text-xs" id="locationPhone"></p>
        </div>
      </div>
    </div>

    <!-- Payment -->
    <div class="fade-up-4 bg-white/5 rounded-xl p-4 border border-white/10 flex justify-between items-center">
      <p class="text-xs font-bold uppercase tracking-wide text-slate-500">Payment</p>
      <p class="font-bold text-sm" id="paymentText">COD</p>
    </div>

  </div>

  <!-- Bottom Button -->
  <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 pb-8 bg-background-dark/90 backdrop-blur-md border-t border-white/10">
    <button onclick="window.location.href='index.html'"
      class="w-full bg-primary hover:bg-red-700 text-white py-4 rounded-xl font-bold text-base uppercase tracking-widest shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined">restaurant_menu</span>
      Order Again
    </button>
  </div>

</div>

<script>
  // ─── PRODUCT DATA ────────────────────────────────────────
  const PRODUCTS = {
    fishball:  { name: 'Fishball',  price: 1    },
    kikiam:    { name: 'Kikiam',    price: 2.5  },
    squidball: { name: 'Squidball', price: 5    },
    bbq:       { name: 'BBQ',       price: 15   },
    siomai:    { name: 'Siomai',    price: 25   },
    siopao:    { name: 'Siopao',    price: 35   },
  };

  const DELIVERY_FEE = parseFloat(localStorage.getItem('2suk_delivery_fee') || '20');

  // ─── LOAD ORDER ──────────────────────────────────────────
  const order = JSON.parse(localStorage.getItem('2suk_current_order') || 'null');
  if (!order) { window.location.href = 'index.html'; }

  // ─── STATUS CONFIG ───────────────────────────────────────
  const ALL_STEPS = [
    { key: 'pending',    label: 'Order Received',     desc: 'Your order has been placed',          icon: 'check_circle'       },
    { key: 'confirmed',  label: 'Order Confirmed',     desc: 'The store confirmed your order',      icon: 'storefront'         },
    { key: 'preparing',  label: 'Preparing',           desc: 'Your food is being prepared',         icon: 'soup_kitchen'       },
    { key: 'ready',      label: 'Ready',               desc: order?.orderType === 'delivery' ? 'Rider is on the way!' : 'Ready for pick-up!', icon: order?.orderType === 'delivery' ? 'delivery_dining' : 'done_all' },
    { key: 'completed',  label: 'Completed',           desc: 'Order delivered. Enjoy! 🎉',          icon: 'celebration'        },
  ];

  const STATUS_ORDER = ['pending', 'confirmed', 'preparing', 'ready', 'completed'];

  const STATUS_COLORS = {
    pending:   { dot: 'bg-yellow-400', badge: 'border-yellow-400/30 text-yellow-400', label: 'Pending'   },
    confirmed: { dot: 'bg-blue-400',   badge: 'border-blue-400/30 text-blue-400',     label: 'Confirmed' },
    preparing: { dot: 'bg-orange-400', badge: 'border-orange-400/30 text-orange-400', label: 'Preparing' },
    ready:     { dot: 'bg-green-400',  badge: 'border-green-400/30 text-green-400',   label: 'Ready! 🙌' },
    completed: { dot: 'bg-primary',    badge: 'border-primary/30 text-primary',       label: 'Completed' },
  };

  // ─── RENDER STATUS BADGE ─────────────────────────────────
  function renderStatusBadge(status) {
    const config = STATUS_COLORS[status] || STATUS_COLORS.pending;
    document.getElementById('statusDot').className = `w-2 h-2 rounded-full animate-pulse ${config.dot}`;
    document.getElementById('statusLabel').textContent = config.label;
    document.getElementById('statusLabel').className = `text-xs font-bold uppercase tracking-wide ${config.badge.split(' ').pop()}`;
    document.getElementById('statusBadge').className = `flex items-center gap-2 px-3 py-2 rounded-full border ${config.badge}`;
  }

  // ─── RENDER STEPS ────────────────────────────────────────
  function renderSteps(currentStatus) {
    const currentIndex = STATUS_ORDER.indexOf(currentStatus);
    const container = document.getElementById('stepsContainer');

    container.innerHTML = ALL_STEPS.map((step, i) => {
      const isDone    = i < currentIndex;
      const isActive  = i === currentIndex;
      const isPending = i > currentIndex;

      const circleClass = isDone
        ? 'bg-green-500 border-green-500'
        : isActive
          ? 'bg-primary border-primary ping-ring'
          : 'bg-transparent border-slate-700';

      const iconColor = isDone || isActive ? 'text-white' : 'text-slate-600';
      const labelColor = isDone ? 'text-green-400' : isActive ? 'text-white' : 'text-slate-600';
      const descColor = isDone ? 'text-slate-400' : isActive ? 'text-slate-300' : 'text-slate-700';
      const lineColor = isDone ? 'bg-green-500' : 'bg-slate-800';

      return `
        <div class="flex gap-4">
          <!-- Left: circle + line -->
          <div class="flex flex-col items-center" style="width:28px">
            <div class="relative w-7 h-7 rounded-full border-2 flex items-center justify-center flex-shrink-0 ${circleClass}" style="z-index:1">
              <span class="material-symbols-outlined text-sm ${iconColor}" style="font-variation-settings:'FILL' 1">${step.icon}</span>
            </div>
            ${i < ALL_STEPS.length - 1 ? `<div class="step-line ${lineColor} w-0.5"></div>` : ''}
          </div>

          <!-- Right: text -->
          <div class="pb-5 flex-1">
            <p class="font-bold text-sm ${labelColor}">${step.label}</p>
            <p class="text-xs ${descColor} mt-0.5">${step.desc}</p>
            ${isActive ? `<span class="inline-block mt-1 text-[10px] bg-primary/20 text-primary px-2 py-0.5 rounded-full font-bold uppercase tracking-wide">Current</span>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // ─── RENDER ITEMS ────────────────────────────────────────
  function renderItems() {
    const container = document.getElementById('orderItems');
    container.innerHTML = Object.entries(order.items).map(([key, qty]) => {
      const p = PRODUCTS[key];
      if (!p) return '';
      return `
        <div class="flex justify-between items-center px-4 py-3">
          <div>
            <p class="font-bold text-sm">${p.name}</p>
            <p class="text-xs text-slate-500">x${qty}</p>
          </div>
          <p class="font-bold text-primary text-sm">₱${(p.price * qty).toFixed(2)}</p>
        </div>
      `;
    }).join('');
  }

  // ─── RENDER TOTALS ───────────────────────────────────────
  function renderTotals() {
    const subtotal = Object.entries(order.items).reduce((sum, [key, qty]) => {
      return sum + ((PRODUCTS[key]?.price || 0) * qty);
    }, 0);
    const fee = order.orderType === 'delivery' ? DELIVERY_FEE : 0;
    document.getElementById('totalAmount').textContent = `₱${(subtotal + fee).toFixed(2)}`;
  }

  // ─── RENDER LOCATION ─────────────────────────────────────
  function renderLocation() {
    const isDelivery = order.orderType === 'delivery';
    document.getElementById('locationTitle').textContent = isDelivery ? 'Delivery Address' : 'Pick-up Info';
    document.getElementById('locationIcon').textContent = isDelivery ? 'location_on' : 'storefront';
    document.getElementById('locationName').textContent = order.name;
    document.getElementById('locationPhone').textContent = order.phone;
    document.getElementById('locationAddress').textContent = isDelivery
      ? [order.barangay, order.landmark].filter(Boolean).join(', ')
      : 'Pick up at the store — we\'ll text you when ready!';
  }

  // ─── RENDER TYPE & ETA ───────────────────────────────────
  function renderTypeEta() {
    const isDelivery = order.orderType === 'delivery';
    document.getElementById('typeIcon').textContent = isDelivery ? 'delivery_dining' : 'storefront';
    document.getElementById('typeText').textContent = isDelivery ? 'Delivery' : 'Pick-up';
    document.getElementById('etaText').textContent = isDelivery ? '20-30 min' : '15-20 min';
  }

  // ─── RENDER PAYMENT ──────────────────────────────────────
  function renderPayment() {
    document.getElementById('paymentText').textContent =
      order.paymentMethod === 'gcash' ? '📱 GCash' : '💵 Cash on Delivery';
  }

  // ─── INIT ────────────────────────────────────────────────
  const currentStatus = order.status || 'pending';
  document.getElementById('orderId').textContent = order.id;
  renderStatusBadge(currentStatus);
  renderSteps(currentStatus);
  renderItems();
  renderTotals();
  renderLocation();
  renderTypeEta();
  renderPayment();
</script>
</body>
</html>
