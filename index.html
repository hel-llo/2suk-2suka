        </div>
      `;
      main.appendChild(section);
    });

    // Products with no category
    const uncategorized = allProducts.filter(p => !p.category);
    if (uncategorized.length > 0) {
      const section = document.createElement('section');
      section.className = 'mb-8';
      section.innerHTML = `
        <div class="flex items-center gap-2 mb-4">
          <span class="material-symbols-outlined text-primary">category</span>
          <h2 class="text-2xl font-bold tracking-tight">Others</h2>
        </div>
        <div class="space-y-4">
          ${uncategorized.map(p => renderProduct(p)).join('')}
        </div>
      `;
      main.appendChild(section);
    }
  }

  // ─── RENDER SINGLE PRODUCT ───────────────────────────────
  function renderProduct(p) {
    const qty = cart[p.id] || 0;
    const options = p.options || ['None'];
    const hasOptions = !(options.length === 1 && options[0].toLowerCase() === 'none');

    return `
      <div class="bg-card-cream dark:bg-slate-800 rounded-xl overflow-hidden shadow-lg border-l-4 ${p.available ? 'border-primary' : 'border-slate-400 opacity-60'} flex">
        <div class="w-1/3 bg-cover bg-center min-h-[100px]"
          style="${p.img ? `background-image:url('${p.img}')` : 'background:#e2e8f0'}"></div>
        <div class="flex-1 p-4 flex flex-col gap-3">
          <div class="flex justify-between items-start">
            <div>
              <h3 class="font-bold text-lg dark:text-slate-100 text-slate-900">${p.name}</h3>
              ${!p.available ? '<span class="text-xs text-slate-400 font-bold uppercase">Sold Out</span>' : ''}
            </div>
            <span class="text-primary font-bold text-lg">₱${p.price}</span>
          </div>
          ${p.available ? `
          <div class="flex gap-2 items-center flex-wrap">
            ${hasOptions ? `
              <select class="bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-xs py-1 px-2">
                ${options.map(o => `<option>${o}</option>`).join('')}
              </select>
            ` : `<span class="text-xs text-slate-400 italic">No options</span>`}
            <div class="flex items-center bg-primary rounded-lg text-white ml-auto">
              <button onclick="updateQty(${p.id}, -1)" class="px-2 py-1">
                <span class="material-symbols-outlined text-sm">remove</span>
              </button>
              <span id="qty-${p.id}" class="px-2 font-bold text-sm">${qty}</span>
              <button onclick="updateQty(${p.id}, 1)" class="px-2 py-1">
                <span class="material-symbols-outlined text-sm">add</span>
              </button>
            </div>
          </div>` : ''}
        </div>
      </div>
    `;
  }

  // ─── UPDATE QTY ──────────────────────────────────────────
  function updateQty(id, change) {
    cart[id] = Math.max(0, (cart[id] || 0) + change);
    if (cart[id] === 0) delete cart[id];
    const el = document.getElementById('qty-' + id);
    if (el) el.textContent = cart[id] || 0;
    localStorage.setItem('2suk_cart', JSON.stringify(cart));
    updateCartBtn();
    const p = allProducts.find(p => p.id == id);
    if (change > 0 && p) showToast(`${p.name} added to cart 🛒`);
  }

  // ─── CART BUTTON ─────────────────────────────────────────
  function updateCartBtn() {
    const totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
    const totalPrice = Object.entries(cart).reduce((sum, [id, qty]) => {
      const p = allProducts.find(p => p.id == id);
      return sum + ((p?.price || 0) * qty);
    }, 0);
    document.getElementById('cartBtnText').textContent = `View Cart (${totalItems} Item${totalItems !== 1 ? 's' : ''})`;
    document.getElementById('cartTotal').textContent = totalItems > 0 ? `₱${totalPrice.toFixed(2)}` : '';
  }

  // ─── GO TO CART ──────────────────────────────────────────
  function goToCart() {
    const totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
    if (totalItems === 0) { showToast('Your cart is empty! Add items first 😊'); return; }
    window.location.href = 'cart.html';
  }

  // ─── TOAST ───────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ─── INIT ────────────────────────────────────────────────
  renderMenu();
  updateCartBtn();
</script>
</body>
</html>
