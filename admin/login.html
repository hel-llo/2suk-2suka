<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - 2suk-2suka</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#da0b0b",
          "background-dark": "#000000",
        },
        fontFamily: { "display": ["Space Grotesk"] },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  body { font-family: 'Space Grotesk', sans-serif; min-height: 100dvh; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(24px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  .fade-up-1 { animation: fadeUp 0.4s ease 0.1s forwards; opacity: 0; }
  .fade-up-2 { animation: fadeUp 0.4s ease 0.25s forwards; opacity: 0; }
  .fade-up-3 { animation: fadeUp 0.4s ease 0.4s forwards; opacity: 0; }
  .fade-up-4 { animation: fadeUp 0.4s ease 0.55s forwards; opacity: 0; }
  .shake { animation: shake 0.4s ease; }

  .input-field {
    width: 100%;
    background: #fdf8ec;
    color: #0f172a;
    border: 1.5px solid #fdf8ec;
    border-radius: 12px;
    padding: 16px 16px 16px 48px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
    caret-color: #da0b0b;
}
.input-field:focus { border-color: #da0b0b; }
.input-field.error { border-color: #ef4444; }
.input-field::placeholder { color: #94a3b8; }
</style>
</head>

<body class="bg-background-dark text-slate-100 font-display flex items-center justify-center min-h-screen px-4">

<div class="w-full max-w-sm">

  <!-- Logo & Title -->
  <div class="fade-up-1 flex flex-col items-center mb-10">
    <div class="w-20 h-20 rounded-2xl bg-primary flex items-center justify-center mb-4 shadow-lg shadow-primary/30">
      <span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings:'FILL' 1">storefront</span>
    </div>
    <h1 class="text-3xl font-bold text-white tracking-tight">2suk-2suka</h1>
    <p class="text-primary font-bold text-sm mt-1 tracking-widest uppercase">Admin Portal</p>
  </div>

  <!-- Login Card -->
  <div class="fade-up-2 bg-white/5 rounded-2xl p-6 border border-white/10 space-y-4" id="loginCard">

    <div>
      <p class="text-lg font-bold text-white mb-1">Welcome back! 👋</p>
      <p class="text-slate-500 text-sm">Sign in to manage your store</p>
    </div>

    <!-- Username -->
    <div class="relative">
  <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm" style="pointer-events:none; z-index:1">person</span>
  <input id="username" class="input-field" type="text" placeholder="Username" autocomplete="off" style="position:relative; z-index:2;"/>
</div>

    <!-- Password -->
    <div class="relative">
  <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm" style="pointer-events:none; z-index:1">lock</span>
  <input id="password" class="input-field" type="password" placeholder="Password" autocomplete="off" style="position:relative; z-index:2;"/>
  <button onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors" style="z-index:3">
    <span class="material-symbols-outlined text-sm" id="eyeIcon">visibility</span>
  </button>
</div>

    <!-- Error Message -->
    <div id="errorMsg" class="hidden flex items-center gap-2 px-4 py-3 bg-red-500/10 border border-red-500/20 rounded-xl">
      <span class="material-symbols-outlined text-red-400 text-sm">error</span>
      <p class="text-red-400 text-sm font-medium" id="errorText">Invalid username or password</p>
    </div>

    <!-- Login Button -->
    <button onclick="login()" id="loginBtn"
      class="w-full bg-primary hover:bg-red-700 text-white py-4 rounded-xl font-bold text-base uppercase tracking-widest shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2">
      <span id="btnText">Sign In</span>
      <span class="material-symbols-outlined" id="btnIcon">login</span>
    </button>

  </div>

  <!-- Hint -->
  <div class="fade-up-3 mt-4 text-center">
    <p class="text-slate-700 text-xs">Protected area — store admins only</p>
  </div>

  <!-- Back to menu link -->
  <div class="fade-up-4 mt-6 text-center">
    <a href="../index.html" class="text-slate-500 text-sm hover:text-primary transition-colors flex items-center justify-center gap-1">
      <span class="material-symbols-outlined text-sm">arrow_back</span>
      Back to Menu
    </a>
  </div>

</div>

<script>
  // ─── CREDENTIALS ─────────────────────────────────────────
  // Change these to your own username and password!
  const ADMIN_USERNAME = 'admin';
  const ADMIN_PASSWORD = '1232suk1232suka123';

  // ─── CHECK IF ALREADY LOGGED IN ──────────────────────────
  if (localStorage.getItem('2suk_admin_logged_in') === 'true') {
    window.location.href = 'dashboard.html';
  }

  // ─── LOGIN ───────────────────────────────────────────────
  function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');

    // Clear previous errors
    hideError();

    // Validate empty fields
    if (!username) { markError('username', 'Enter your username'); return; }
    if (!password) { markError('password', 'Enter your password'); return; }

    // Loading state
    btn.disabled = true;
    btnText.textContent = 'Signing in...';
    btnIcon.textContent = 'hourglass_empty';

    setTimeout(() => {
      if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
        // ✅ Correct — save session and go to dashboard
        localStorage.setItem('2suk_admin_logged_in', 'true');
        window.location.href = 'dashboard.html';
      } else {
        // ❌ Wrong credentials
        btn.disabled = false;
        btnText.textContent = 'Sign In';
        btnIcon.textContent = 'login';
        showError('Invalid username or password');
        shakeCard();

        // Clear password field
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }, 1000);
  }

  // ─── TOGGLE PASSWORD VISIBILITY ──────────────────────────
  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.textContent = isHidden ? 'visibility_off' : 'visibility';
  }

  // ─── ERROR HELPERS ───────────────────────────────────────
  function showError(msg) {
    const box = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    box.classList.remove('hidden');
    box.classList.add('flex');
  }

  function hideError() {
    const box = document.getElementById('errorMsg');
    box.classList.add('hidden');
    box.classList.remove('flex');
  }

  function markError(id, placeholder) {
    const el = document.getElementById(id);
    el.classList.add('error');
    el.placeholder = placeholder;
    el.focus();
    setTimeout(() => {
      el.classList.remove('error');
    }, 2000);
  }

  function shakeCard() {
    const card = document.getElementById('loginCard');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
  }

  // ─── LOGIN ON ENTER KEY ──────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
